# ─────────────────────────────────────────────
#  docker-compose.yml — Lavanya's RAG Stack
#  Runs: FastAPI backend + serves frontend UI
# ─────────────────────────────────────────────

version: "3.9"

services:

  # ── RAG API (FastAPI) ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lavanya-rag-api
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      # Mount chroma_db so data persists between restarts
      - ./chroma_db:/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Frontend UI (served via nginx) ──
  frontend:
    image: nginx:alpine
    container_name: lavanya-rag-ui
    ports:
      - "3000:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
